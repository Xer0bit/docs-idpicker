{{/* Branding: Open Graph + Twitter Card logo */}}
<meta property="og:image" content="{{ "logo.png" | absURL }}">
<meta property="og:image:width" content="1800">
<meta property="og:image:height" content="586">
<meta name="twitter:image" content="{{ "logo.png" | absURL }}">
<meta name="twitter:card" content="summary_large_image">

<style>
/* ── Logo override: hide Docsy's default SVG, inject our PNG ── */
.td-navbar .navbar-brand__logo svg {
  display: none !important;
}
.td-navbar .navbar-brand__logo {
  display: flex !important;
  align-items: center !important;
  width: 160px;
  height: 40px;
  background: url('{{ "logo.png" | relURL }}') no-repeat left center / contain;
  flex-shrink: 0;
}

/* Bruteforce hide the generic Docsy text in the navbar so only our pristine brand logo shows */
.td-navbar .navbar-brand__name {
  display: none !important;
  opacity: 0 !important;
  visibility: hidden !important;
}

/* Force hide the massive default black footer */
.td-footer, footer, .bg-dark, footer.bg-dark { 
  display: none !important; 
}

/* Homepage strict grid layout (failsafe if Bootstrap variables drop out) */
@media (min-width: 768px) {
  .home-grid-strict {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 1.5rem !important;
  }
}
@media (max-width: 767px) {
  .home-grid-strict {
    display: flex !important;
    flex-direction: column !important;
    gap: 1rem !important;
  }
}
</style>
