{{ $logo := resources.Get "icons/logo.png" }}
<a class="navbar-brand" href="{{ "/" | relLangURL }}" aria-label="IDPicker">
  <span class="navbar-brand__logo" style="display:flex;align-items:center;">
    {{ if $logo }}

    {{ end }}
  </span>
</a>
