version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: idpicker_docs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: idpicker_wikijs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # If behind proxy/SSL, keep true in production.
      SSL_ACTIVE: ${WIKI_SSL_ACTIVE}
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: idpicker_docs_proxy
    restart: unless-stopped
    depends_on:
      - wikijs
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  caddy_data:
  caddy_config:
