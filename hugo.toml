baseURL = "https://xer0bit.github.io/docs-idpicker/"
title = "IDPicker Docs"
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableGitInfo = true

[module]
  [[module.imports]]
    path = "github.com/google/docsy"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS", "print", "JSON"]
  page = ["HTML", "print"]

[params]
  description = "Documentation for IDPicker"
  offlineSearch = true
  offlineSearchSummaryLength = 70
  offlineSearchMaxResults = 10
  
  [params.ui]
    sidebar_menu_compact = true
    breadcrumb_disable = false
    pager = true

[markup.goldmark.renderer]
  unsafe = true