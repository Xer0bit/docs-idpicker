{{/* Branding: Open Graph + Twitter Card logo */}}
{{ $logo := resources.Get "icons/logo.png" }}
{{ if $logo }}
<meta property="og:image" content="{{ $logo.Permalink }}">
<meta property="og:image:width" content="1800">
<meta property="og:image:height" content="586">
<meta name="twitter:image" content="{{ $logo.Permalink }}">
<meta name="twitter:card" content="summary_large_image">

<style>
/* ── Logo: hide Docsy's bundled SVG, replace with IDPicker logo via pseudo-element ── */
.td-navbar .navbar-brand__logo svg,
.td-navbar .navbar-brand__logo img:not(.idpicker-logo) {
  display: none !important;
}
.td-navbar .navbar-brand__logo {
  display: block !important;
  width: 160px !important;
  height: 40px !important;
  background-image: url('{{ $logo.RelPermalink }}') !important;
  background-repeat: no-repeat !important;
  background-position: left center !important;
  background-size: contain !important;
  flex-shrink: 0;
}
</style>
{{ end }}

<style>
/* Hide Docsy brand text and SVG — logo injected via JS */
.td-navbar .navbar-brand__name {
  display: none !important;
  opacity: 0 !important;
  visibility: hidden !important;
}

/* Force hide the massive default black footer */
.td-footer, footer, .bg-dark, footer.bg-dark { 
  display: none !important; 
}

/* Homepage strict grid layout (failsafe if Bootstrap variables drop out) */
@media (min-width: 768px) {
  .home-grid-strict {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 1.5rem !important;
  }
}
@media (max-width: 767px) {
  .home-grid-strict {
    display: flex !important;
    flex-direction: column !important;
    gap: 1rem !important;
  }
}
</style>
